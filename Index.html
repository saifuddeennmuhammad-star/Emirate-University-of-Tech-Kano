<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emirate University of Science and Technology Kano - Inventory System</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f4f6f9;
            --text-dark: #333;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* --- NAVIGATION BAR --- */
        .navbar {
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-brand {
            color: #ecf0f1;
            font-size: 1.3rem;
            font-weight: bold;
            margin-right: 30px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background-color: var(--secondary-color);
            color: #ecf0f1;
            border: none;
            padding: 8px 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--accent-color);
        }

        /* --- MAIN APP CONTAINER --- */
        .app-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .view-section {
            display: none;
        }

        .view-section.active-view {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        /* --- DASHBOARD VIEW --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-top: 4px solid var(--accent-color);
        }

        .card.stock { border-top-color: var(--success-color); }
        .card.value { border-top-color: #e67e22; }

        .card-title {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* --- INVENTORY VIEW (SPLIT LAYOUT) --- */
        .inventory-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .form-side {
            flex: 1;
            min-width: 300px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            align-self: flex-start;
        }

        .table-side {
            flex: 2;
            min-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        /* --- FORMS & INPUTS --- */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--secondary-color);
        }

        .form-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 10px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-add { background-color: var(--success-color); }
        .btn-save { background-color: var(--accent-color); }
        .btn-delete { background-color: var(--danger-color); }
        .btn-clear { background-color: #95a5a6; }
        .action-btn:hover { opacity: 0.9; }

        /* --- DATA TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f1f3f5;
            cursor: pointer;
        }

        tr.selected-row {
            background-color: #e3f2fd !important;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">Emirate Uni Kano</div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="switchView('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="switchView('inventory')">Manage Inventory</button>
        </div>
    </nav>

    <div class="app-container">

        <section id="dashboard-view" class="view-section active-view">
            <h2>System Dashboard</h2>
            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-title">Total Unique Products</div>
                    <div id="stat-total-items" class="card-value">0</div>
                </div>
                <div class="card stock">
                    <div class="card-title">Total Items in Stock</div>
                    <div id="stat-total-stock" class="card-value">0</div>
                </div>
                <div class="card value">
                    <div class="card-title">Total Inventory Value</div>
                    <div id="stat-total-value" class="card-value">$0.00</div>
                </div>
            </div>
        </section>

        <section id="inventory-view" class="view-section">
            <h2>Inventory Management</h2>
            <div class="inventory-layout">
                
                <div class="form-side">
                    <h3 style="margin-bottom: 15px;">Product Details</h3>
                    <input type="hidden" id="prod-id">
                    
                    <div class="form-group">
                        <label for="prod-name">Product Name *</label>
                        <input type="text" id="prod-name" placeholder="e.g. Wireless Mouse">
                    </div>
                    <div class="form-group">
                        <label for="prod-sku">SKU Barcode *</label>
                        <input type="text" id="prod-sku" placeholder="e.g. MS-WRLSS-01">
                    </div>
                    <div class="form-group">
                        <label for="prod-cat">Category</label>
                        <input type="text" id="prod-cat" placeholder="e.g. Electronics">
                    </div>
                    <div class="form-group">
                        <label for="prod-qty">Quantity</label>
                        <input type="number" id="prod-qty" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label for="prod-price">Unit Price ($)</label>
                        <input type="number" id="prod-price" placeholder="0.00" step="0.01" min="0">
                    </div>

                    <div class="btn-grid">
                        <button class="action-btn btn-add" onclick="addProduct()">Add New</button>
                        <button class="action-btn btn-save" onclick="updateProduct()">Save Changes</button>
                        <button class="action-btn btn-delete" onclick="deleteProduct()">Delete</button>
                        <button class="action-btn btn-clear" onclick="clearForm()">Clear Form</button>
                    </div>
                </div>

                <div class="table-side">
                    <table>
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th style="text-align: center;">Stock Qty</th>
                                <th style="text-align: right;">Price</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body">
                            </tbody>
                    </table>
                </div>

            </div>
        </section>
    </div>

    <script>
        // State storage using LocalStorage fallback 
        let inventory = JSON.parse(localStorage.getItem('products_db')) || [];
        let selectedProductId = null;

        // Initialize App UI
        document.addEventListener('DOMContentLoaded', () => {
            updateDashboardMetrics();
            renderTable();
        });

        // Navigation Controller
        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active-view'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            if (viewName === 'dashboard') {
                document.getElementById('dashboard-view').classList.add('active-view');
                event.target.classList.add('active');
                updateDashboardMetrics();
            } else if (viewName === 'inventory') {
                document.getElementById('inventory-view').classList.add('active-view');
                event.target.classList.add('active');
                renderTable();
            }
        }

        // Calculate Dashboard Metrics
        function updateDashboardMetrics() {
            const totalUnique = inventory.length;
            const totalStock = inventory.reduce((sum, item) => sum + parseInt(item.quantity || 0), 0);
            const totalValue = inventory.reduce((sum, item) => sum + (parseInt(item.quantity || 0) * parseFloat(item.price || 0)), 0);

            document.getElementById('stat-total-items').innerText = totalUnique;
            document.getElementById('stat-total-stock').innerText = totalStock;
            document.getElementById('stat-total-value').innerText = `$${totalValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        // Render Data Matrix onto Table
        function renderTable() {
            const tbody = document.getElementById('inventory-table-body');
            tbody.innerHTML = '';

            if(inventory.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#95a5a6;">No inventory items found. Add items to begin.</td></tr>`;
                return;
            }

            inventory.forEach(item => {
                const tr = document.createElement('tr');
                if (selectedProductId === item.id) tr.classList.add('selected-row');
                
                tr.onclick = () => selectRow(item);
                tr.innerHTML = `
                    <td><strong>${escapeHtml(item.sku)}</strong></td>
                    <td>${escapeHtml(item.name)}</td>
                    <td>${escapeHtml(item.category || '-')}</td>
                    <td style="text-align: center;">${item.quantity}</td>
                    <td style="text-align: right;">$${parseFloat(item.price).toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Map Clicked row back to Entries Form
        function selectRow(item) {
            selectedProductId = item.id;
            document.getElementById('prod-id').value = item.id;
            document.getElementById('prod-name').value = item.name;
            document.getElementById('prod-sku').value = item.sku;
            document.getElementById('prod-cat').value = item.category;
            document.getElementById('prod-qty').value = item.quantity;
            document.getElementById('prod-price').value = item.price;
            renderTable();
        }

        // Create Operations
        function addProduct() {
            const name = document.getElementById('prod-name').value.trim();
            const sku = document.getElementById('prod-sku').value.trim();
            const category = document.getElementById('prod-cat').value.trim();
            const quantity = parseInt(document.getElementById('prod-qty').value) || 0;
            const price = parseFloat(document.getElementById('prod-price').value) || 0.0;

            if (!name || !sku) {
                alert('Product Name and SKU are mandatory fields.');
                return;
            }

            if (inventory.some(item => item.sku.toLowerCase() === sku.toLowerCase())) {
                alert('A product with this SKU already exists.');
                return;
            }

            const newProduct = { id: Date.now().toString(), name, sku, category, quantity, price };
            inventory.push(newProduct);
            saveToStorage();
            clearForm();
            alert('Product added successfully!');
        }

        // Update/Save Entries Operation
        function updateProduct() {
            if (!selectedProductId) {
                alert('Please select a product from the list to update.');
                return;
            }

            const name = document.getElementById('prod-name').value.trim();
            const sku = document.getElementById('prod-sku').value.trim();
            const category = document.getElementById('prod-cat').value.trim();
            const quantity = parseInt(document.getElementById('prod-qty').value) || 0;
            const price = parseFloat(document.getElementById('prod-price').value) || 0.0;

            if (!name || !sku) {
                alert('Product Name and SKU cannot be blank.');
                return;
            }

            // SKU integrity check
            if (inventory.some(item => item.sku.toLowerCase() === sku.toLowerCase() && item.id !== selectedProductId)) {
                alert('Another product is already assigning this SKU barcode.');
                return;
            }

            const itemIndex = inventory.findIndex(item => item.id === selectedProductId);
            if (itemIndex > -1) {
                inventory[itemIndex] = { id: selectedProductId, name, sku, category, quantity, price };
                saveToStorage();
                alert('Inventory updates saved successfully!');
            }
        }

        // Delete Operation
        function deleteProduct() {
            if (!selectedProductId) {
                alert('Please select a product to delete.');
                return;
            }

            if (confirm('Are you sure you want to delete this item permanently?')) {
                inventory = inventory.filter(item => item.id !== selectedProductId);
                saveToStorage();
                clearForm();
            }
        }

        function clearForm() {
            selectedProductId = null;
            document.getElementById('prod-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-sku').value = '';
            document.getElementById('prod-cat').value = '';
            document.getElementById('prod-qty').value = '';
            document.getElementById('prod-price').value = '';
            renderTable();
        }

        function saveToStorage() {
            localStorage.setItem('products_db', JSON.stringify(inventory));
            renderTable();
        }

        // XSS sanitization helper
        function escapeHtml(text) {
            if (!text) return '';
            return text.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
